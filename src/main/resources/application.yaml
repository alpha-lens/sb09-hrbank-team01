spring:
  profiles:
    active: local
    jackson:
      serialization:
        write-dates-as-timestamps: false
      mvc:
        format:
          date-time: iso

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html  # 접속 경로 설정
    groups-order: DESC
  api-docs:
    path: /api-docs
